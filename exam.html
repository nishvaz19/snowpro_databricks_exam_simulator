<!DOCTYPE html>
<html>
<head>
    <title>Examination System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Line 1: Meta Info Alignment */
.exam-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f8fafc;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid #e2e8f0;
}

/* Line 2: Search/Top 100 Container */
.search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.hot-selection-box {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    border: 1px solid #000; /* Thin black border */
    border-radius: 4px;
    height: 38px; /* Match input height */
    background: white;
}

.hot-selection-box label {
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}

/* Footer Actions */
.right-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}
        .btn-analytics {
            background: #64748b;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        .btn-analytics:hover { background: #475569; }

        /* Search Bar Styling */
        .search-container {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .search-container input {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            flex-grow: 1;
            font-size: 0.85rem;
        }
        .btn-focus {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

    .hot-selection-box input[type="checkbox"] {
        cursor: pointer;
        margin: 0;
        width: 16px;
        height: 16px;
    }
    </style>
    <script src="js/examEngine.js"></script>
</head>
<body>
<div class="exam-wrapper">
    <header class="exam-header">
        <h1 id="examTitle" style="margin-bottom: 15px;">Loading Examination...</h1>

        <div class="exam-meta-row">
            <div id="timer" class="timer" style="font-weight: bold; color: #e11d48;">00:00</div>
            <div id="progress" class="progress" style="font-weight: 500;">Question 0 of 0</div>
            <div id="runningScore" class="running-score" style="font-family: monospace; background: #1e293b; color: #38bdf8; padding: 4px 12px; border-radius: 4px;">
                H:0 M:0 E:0 | Score: 0/0
            </div>
        </div>

        <div class="search-row">
            <div class="hot-selection-box">
                <label for="hotToggle">
                    <input type="checkbox" id="hotToggle" onchange="startExam()">
                    🔥 Top 100
                </label>
            </div>
            
            <input type="text" id="keywordSearch" 
                   style="flex-grow: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;" 
                   placeholder="Filter by keyword (e.g. RxJS)..." 
                   onkeyup="if(event.key==='Enter') startExam()">
            
            <button class="btn-focus" onclick="startExam()" style="padding: 8px 20px;">Apply Focus</button>
        </div>
    </header>

    <main class="exam-container">
        <div class="question-card">
            <div id="question" class="question-text"></div>
            <div id="options" class="options"></div>
            <div id="hint" class="hint"></div>
        </div>

        <div class="exam-actions">
            <div class="left-actions">
                <button onclick="showHint()">Hint</button>
                <button onclick="flagCurrent()">Flag</button>
            </div>
            <div class="nav-actions">
                <button onclick="prevQuestion()">Previous</button>
                <button onclick="nextQuestion()">Next</button>
            </div>
            <div class="right-actions">
                <button class="btn-analytics" onclick="window.location.href='analytics.html'">📊 View Analytics</button>
                <button onclick="reviewExam()">Review Flagged</button>
                <button onclick="submitExam()" class="submit-btn">Submit Exam</button>
            </div>
        </div>
        <div id="results" class="results"></div>
    </main>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const examType = urlParams.get('type');
    const focusKeyword = urlParams.get('focus'); // Get the buzzword from URL

    // Set the global for the analytics tracker
    window.currentExamType = examType;
    
    const examMap = {
        'snowflake': { title: 'Snowflake Certification', file: 'js/questionBank_snowflake.js' },
        'databricks': { title: 'Databricks Certification', file: 'js/questionBank_databricks.js' },
        'python_pySpark': { title: 'Python/PySpark Exam', file: 'js/questionBank_python_pySpark.js' },
        'java': { title: 'Java Enterprise Exam', file: 'js/questionBank_Java.js' },
        'sql': { title: 'SQL Certification', file: 'js/questionBank_SQL.js' },
        'mongodb': { title: 'MongoDB Certification', file: 'js/questionBank_mongoDB.js' },
        'nodejs': { title: 'Nodejs Certification', file: 'js/questionBank_nodeJS.js' },
        'react': { title: 'React Certification', file: 'js/questionBank_react.js' },
        'azure': { title: 'Azure Pro/Arch Exam', file: 'js/questionBank_Azure.js' },
        'aws': { title: 'AWS Pro/Arch Exam', file: 'js/questionBank_AWS.js' },
        'kafka': { title: 'kafka Exam', file: 'js/questionBank_kafka.js' },
        'JavaScript': { title: 'Javascript Exam', file: 'js/questionBank_JavaScript.js' },
        'TypeScript_NestJS': { title: 'TypeScript, NestJS, Angular Exam', file: 'js/questionBank_typescript_nestjs.js' },
        'dotnet': { title: 'dotnet & C# & asp.net Exam', file: 'js/questionBank_dotnet.js' },
        'ai_arch': { title: 'AI Architecture Exam', file: 'js/questionBank_AI_Arch.js' },
        'data_architect': { title: 'Data Architect - Data Warehouse Exam', file: 'js/questionBank_Data_Arch.js' },
        'enterprise_architect': { title: 'Enterprise Architect Exam', file: 'js/questionBank_EA.js' },
        'hl7': { title: 'HL7 Exam', file: 'js/questionBank_HL7.js' },
        'ai': { title: 'AI Engineering Exam', file: 'js/questionBank_AI.js' },
        'web3_blockchain': { title: 'Web3 Blockchain Exam', file: 'js/questionBank_web3Blockchain.js' },
    };

    const config = examMap[examType];
    if (config) {
        document.getElementById('examTitle').innerText = config.title;
        
        // Auto-fill the search bar if a buzzword was clicked
        if (focusKeyword) {
            document.getElementById('keywordSearch').value = focusKeyword;
        }

        const script = document.createElement('script');
        script.src = config.file + '?v=' + new Date().getTime(); 
        script.onload = () => { 
            // The examEngine.js startExam() should check the keywordSearch input value
            startExam(); 
        };
        document.head.appendChild(script);
    } else {
        document.getElementById('examTitle').innerText = "Exam Not Found";
    }    
</script>

</body>
</html>
